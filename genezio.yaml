backend:
    functions:
        - entry: dist/index.js
          env: .env
          name: express
          path: .
          type: httpServer
    language:
        name: ts
        packageManager: npm
        runtime: nodejs20.x
    path: .
    scripts:
        deploy:
            - npm install
            - npm run build
        local:
            - npm install
            - npm run build
            - node --env-file=.env dist/index.js
name: travel-agent
region: us-east-1
services:
    databases:
        - name: my-mongo-db
          type: mongo-atlas
yamlVersion: 2
